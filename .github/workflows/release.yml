name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Package dist
        run: |
          cd dist
          zip -r "../linkit-${GITHUB_REF_NAME}.zip" .

      - name: Create release and upload asset
        uses: softprops/action-gh-release@v2
        with:
          files: linkit-${{ github.ref_name }}.zip
          generate_release_notes: true
