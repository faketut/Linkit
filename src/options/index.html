<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Linkit — Options</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        background: #0b0f14;
        color: #e7ecf3;
        min-height: 100vh;
      }
      body {
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          'Segoe UI',
          Roboto,
          'Helvetica Neue',
          Arial,
          sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      .linkit-boot {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 48px;
        color: #8e99a8;
        font-size: 14px;
      }
      .linkit-boot-mark {
        width: 28px;
        height: 28px;
        border-radius: 10px;
        background: linear-gradient(135deg, #4f8def, #1f6fcc);
        box-shadow: 0 0 0 3px rgba(38, 128, 235, 0.32);
      }
      @media (prefers-reduced-motion: no-preference) {
        .linkit-boot-mark {
          animation: linkit-pulse 1.6s ease-in-out infinite;
        }
        @keyframes linkit-pulse {
          0%,
          100% {
            transform: scale(1);
            opacity: 1;
          }
          50% {
            transform: scale(0.92);
            opacity: 0.75;
          }
        }
      }
    </style>
  </head>
  <body>
    <main id="app" role="main" aria-label="Linkit settings" aria-busy="true">
      <div class="linkit-boot">
        <span class="linkit-boot-mark" aria-hidden="true"></span>
        <span>Loading Linkit settings…</span>
      </div>
    </main>
    <script type="module" src="./main.jsx"></script>
  </body>
</html>
